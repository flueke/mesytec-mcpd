[build-system]
requires = ["scikit-build-core", "pybind11", "setuptools-scm"]
build-backend = "scikit_build_core.build"

[project]
name = "mesytec_mcpd_py"
dynamic = ["version"]

[project.optional-dependencies]
gui = ["pyqtgraph", "numpy", "PySide6", "boost-histogram"]

[project.scripts]
mesytec-mcpd-gui = "mesytec_mcpd_py.gui.main_window:main"

[tool.scikit-build]
cmake.args = [ '-DMCPD_ENABLE_PYTHON=ON' ]
build.verbose = true

[tool.setuptools_scm]
version_scheme = "post-release"
local_scheme = "no-local-version"
